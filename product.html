<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Cybercup 6.0 - Tools</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/Hero-mascot.png">
</head>

<body>
    <nav>
        <div class="logo">Cybercup 6.0</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="product.html">Products</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h1>Products</h1>
    </header>

    <section>
        <h2>Buy our products</h2>
        <div id="product-list" class="grid">
            <!-- Data Fetch dari DummyJSON -->
            <p>Loading tools...</p>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h4>Navigation</h4>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="product.html">Products</a></li>
                    <li><a href="profile.html">Profile</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>Resources</h4>
                <ul>
                    <li><a href="#">Cybercup 6.0</a></li>
                    <li><a href="#">Dokumentasi</a></li>
                    <li><a href="#">FAQ</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>Social Media</h4>
                <ul>
                    <li><a href="#">Instagram</a></li>
                    <li><a href="#">Twitter</a></li>
                    <li><a href="#">LinkedIn</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            &copy; 2026 Cybercup 6.0.
        </div>
    </footer>

    <script>
        const productList = document.getElementById('product-list');

        async function loadProducts() {
            try {
                const response = await fetch('https://dummyjson.com/products?limit=9');
                const data = await response.json();

                productList.innerHTML = '';

                data.products.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    // Menampilkan 3 atribut sesuai permintaan: Gambar, Nama, Deskripsi
                    card.innerHTML = `
                        <img src="${item.thumbnail}" alt="${item.title}" class="img-product">
                        <h3>${item.title}</h3>
                        <p style="font-size: 0.8rem; color: #010100;">${item.description}</p>
                    `;
                    productList.appendChild(card);
                });
            } catch (err) {
                productList.innerHTML = '<p>Error loading products.</p>';
            }
        }
        loadProducts();
    </script>
</body>

</html>
